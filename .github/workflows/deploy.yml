name: Build va cPanel'ga deploy

on:
  push:
    branches: [main]
  workflow_dispatch: # qo'lda ham ishga tushirish mumkin

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Kodni olish
        uses: actions/checkout@v4

      - name: Node.js o'rnatish
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: front/package-lock.json

      - name: Bog'liqliklarni o'rnatish
        working-directory: front
        run: npm ci

      - name: Loyihani build qilish
        working-directory: front
        run: npm run build

      - name: cPanel'ga FTP orqali yuklash
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./front/dist/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          dangerous-clean-slate: false
